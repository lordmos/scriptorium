<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Dark warm amber background -->
    <radialGradient id="bg" cx="45%" cy="38%" r="68%">
      <stop offset="0%" stop-color="#1a0800"/>
      <stop offset="100%" stop-color="#040100"/>
    </radialGradient>
    <!-- Central orange glow orb -->
    <radialGradient id="glow-orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#ea580c" stop-opacity="0"/>
    </radialGradient>
    <!-- Feather vane: cream tip → peach → orange → deep orange at nib -->
    <linearGradient id="feather-grad" x1="78%" y1="14%" x2="22%" y2="86%">
      <stop offset="0%"   stop-color="#fffbf7"/>
      <stop offset="28%"  stop-color="#fed7aa"/>
      <stop offset="65%"  stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <!-- Shaft: gold at tip, orange at nib -->
    <linearGradient id="shaft-grad" x1="78%" y1="14%" x2="22%" y2="86%">
      <stop offset="0%"   stop-color="#fef9c3"/>
      <stop offset="45%"  stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <!-- Blurred glow for orb -->
    <filter id="glow-blur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <!-- Soft halo around feather -->
    <filter id="feather-glow" x="-18%" y="-18%" width="136%" height="136%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle glow on shaft -->
    <filter id="shaft-glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="97" fill="url(#bg)"/>

  <!-- Orange glow behind quill -->
  <circle cx="99" cy="97" r="54" fill="url(#glow-orb)" filter="url(#glow-blur)"/>
  <!-- Warm accent glow near nib -->
  <circle cx="65" cy="147" r="22" fill="#fb923c" opacity="0.35" filter="url(#glow-blur)"/>

  <!-- ── Feather vane ──────────────────────────────────────────
       Left (trailing) edge: wide cubic bezier curving far left
       Right (leading) edge: tight quadratic bezier                -->
  <path d="M 136 46 C 100 35, 44 80, 62 150 Q 128 108 136 46 Z"
        fill="url(#feather-grad)" filter="url(#feather-glow)" opacity="0.90"/>

  <!-- Barb lines — left (trailing) side, subtle texture -->
  <line x1="121" y1="67"  x2="111" y2="60"  stroke="#fdba74" stroke-width="1"   opacity="0.38"/>
  <line x1="110" y1="82"  x2="94"  y2="71"  stroke="#fdba74" stroke-width="1"   opacity="0.33"/>
  <line x1="99"  y1="98"  x2="79"  y2="84"  stroke="#fdba74" stroke-width="1"   opacity="0.28"/>
  <line x1="88"  y1="114" x2="72"  y2="102" stroke="#fdba74" stroke-width="1"   opacity="0.22"/>
  <line x1="77"  y1="129" x2="67"  y2="122" stroke="#fdba74" stroke-width="1"   opacity="0.16"/>

  <!-- Barb lines — right (leading) side, even more subtle -->
  <line x1="121" y1="67"  x2="128" y2="71"  stroke="#fed7aa" stroke-width="0.8" opacity="0.28"/>
  <line x1="110" y1="82"  x2="122" y2="91"  stroke="#fed7aa" stroke-width="0.8" opacity="0.24"/>
  <line x1="99"  y1="98"  x2="112" y2="107" stroke="#fed7aa" stroke-width="0.8" opacity="0.20"/>
  <line x1="88"  y1="114" x2="99"  y2="122" stroke="#fed7aa" stroke-width="0.8" opacity="0.16"/>
  <line x1="77"  y1="129" x2="83"  y2="134" stroke="#fed7aa" stroke-width="0.8" opacity="0.12"/>

  <!-- Main shaft (glowing gold line through vane center) -->
  <line x1="136" y1="46" x2="62" y2="150"
        stroke="url(#shaft-grad)" stroke-width="2.5" stroke-linecap="round"
        filter="url(#shaft-glow)"/>

  <!-- Nib tip highlight -->
  <circle cx="62" cy="150" r="3.5" fill="#fff7ed" opacity="0.95"/>
  <!-- Feather tip sparkle -->
  <circle cx="136" cy="46"  r="2"   fill="#fef3c7" opacity="0.85"/>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#f97316" stroke-width="1.4" opacity="0.28"/>
</svg>
